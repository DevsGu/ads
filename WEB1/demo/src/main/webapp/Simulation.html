<h1>Simulação de Financiamento (PRICE)</h1>

<form action="simulacao" method="post">

    <label>Carro:</label>
    <input type="text" name="veiculo">

    <label>Entrada:</label>

    <label>Juros (% ao mês):</label>

    <button type="submit">Simular</button>
